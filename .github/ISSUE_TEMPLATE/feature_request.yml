name: Feature Request
description: 기능 추가 / 수정 / 개선 요청
title: "[Feature] "
labels: ["feature"]
body:
  - type: textarea
    id: background
    attributes:
      label: 배경
      description: 왜 필요한 기능인가?
      placeholder: |
        예) 사용자가 게시글 목록에서 제목을 클릭하면 상세 내용을 확인할 수 있어야 한다.
    validations:
      required: true

  - type: textarea
    id: target
    attributes:
      label: 대상 화면 / 기능
      description: 어떤 화면 또는 기능을 수정하는가?
      placeholder: |
        예)
        - PostDetailPage
        - 게시글 상세 조회
        - /posts/:postId
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 원하는 동작
      description: 사용자가 어떤 흐름으로 기능을 사용하는가?
      placeholder: |
        예)
        - 게시글 목록에서 제목을 클릭한다.
        - /posts/{postId} 페이지로 이동한다.
        - 해당 게시글의 제목, 내용, 작성자, 생성일을 확인한다.
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: 관련 API
      description: 사용하는 백엔드 API가 있다면 작성한다.
      placeholder: |
        예)
        - GET /api/posts/{postId}
        - 응답 data: postId, title, content, writerNickname, createdAt
    validations:
      required: false

  - type: textarea
    id: done
    attributes:
      label: 완료 조건
      placeholder: |
        - [ ] 화면 구현
        - [ ] API 연결
        - [ ] 로딩 상태 처리
        - [ ] 에러 상태 처리
        - [ ] 입력값 검증
        - [ ] 수동 테스트 완료
    validations:
      required: true

  - type: textarea
    id: excluded
    attributes:
      label: 제외 범위
      description: 이번 Issue에서 하지 않을 일을 적는다.
      placeholder: |
        예)
        - 로그인/토큰 인증 처리 제외
        - 댓글 기능 제외
        - 검색/페이징 제외
    validations:
      required: false